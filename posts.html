---
layout: page
title: 文章 · 观点与洞察
subtitle: 15年思考的沉淀
---

<style>
.posts-page { font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif; }

.posts-hero {
  text-align: center;
  padding: 50px 20px 40px;
  background: linear-gradient(135deg, #f8f9fa, #fff);
}
.posts-hero h1 {
  font-size: 32px;
  color: #1a1a2e;
  margin-bottom: 8px;
}
.posts-hero p {
  font-size: 14px;
  color: #999;
}

/* Tags filter */
.tags-filter {
  text-align: center;
  padding: 20px;
  margin-bottom: 30px;
}
.tag-btn {
  display: inline-block;
  padding: 6px 16px;
  margin: 4px;
  border-radius: 20px;
  font-size: 13px;
  color: #555;
  background: #f0f0f0;
  border: none;
  cursor: pointer;
  transition: all 0.3s;
}
.tag-btn:hover, .tag-btn.active {
  background: #1a1a2e;
  color: #fff;
}

/* Post list */
.post-list {
  max-width: 760px;
  margin: 0 auto;
  padding: 0 20px 60px;
}
.post-item {
  display: block;
  padding: 28px 0;
  border-bottom: 1px solid #eee;
  text-decoration: none;
  transition: all 0.3s;
}
.post-item:hover {
  padding-left: 12px;
}
.post-item:last-child { border-bottom: none; }

.post-date {
  font-size: 12px;
  color: #e05c00;
  letter-spacing: 1px;
  margin-bottom: 6px;
}
.post-item h3 {
  font-size: 20px;
  color: #1a1a2e;
  margin-bottom: 8px;
  line-height: 1.4;
}
.post-item:hover h3 { color: #e05c00; }

.post-excerpt {
  font-size: 14px;
  color: #777;
  line-height: 1.7;
  margin-bottom: 8px;
}
.post-meta-tag {
  display: inline-block;
  font-size: 11px;
  color: #999;
  background: #f5f5f5;
  padding: 2px 8px;
  border-radius: 4px;
  margin-right: 6px;
}

@media (max-width: 768px) {
  .posts-hero h1 { font-size: 24px; }
  .post-item h3 { font-size: 17px; }
}
</style>

<div class="posts-page">
  <div class="posts-hero">
    <h1>观点与洞察</h1>
    <p>15年思考的沉淀，从分享主义到知识资产化</p>
  </div>

  <div class="post-list">
    {% for post in site.posts %}
    <a href="{{ post.url | prepend: site.baseurl }}" class="post-item">
      <div class="post-date">{{ post.date | date: "%Y-%m-%d" }}</div>
      <h3>{{ post.title }}</h3>
      {% if post.excerpt %}
      <p class="post-excerpt">{{ post.excerpt | strip_html | truncatewords: 40 }}</p>
      {% endif %}
    </a>
    {% endfor %}
  </div>
</div>
