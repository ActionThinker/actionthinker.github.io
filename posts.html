---
layout: page
title: 文章 · 观点与洞察
subtitle: 15年思考的沉淀
---

<style>
.posts-hero {
  text-align: center;
  padding: 100px 24px 60px;
  max-width: 600px;
  margin: 0 auto;
}
.posts-hero h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(32px, 5vw, 48px);
  font-weight: 600;
  color: #1A1A2E;
  margin-bottom: 12px;
}
.posts-hero p {
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  color: #888;
  line-height: 1.6;
}

.post-list {
  max-width: 720px;
  margin: 0 auto;
  padding: 0 24px 80px;
}
.post-item {
  display: block;
  padding: 28px 0;
  border-bottom: 1px solid #EDEAE5;
  text-decoration: none;
  transition: all 0.3s;
}
.post-item:first-child { padding-top: 0; }
.post-item:hover { padding-left: 12px; }
.post-item:last-child { border-bottom: none; }

.post-date {
  font-family: 'DM Sans', sans-serif;
  font-size: 11px;
  letter-spacing: 1.5px;
  color: #C4882F;
  margin-bottom: 6px;
}
.post-item h3 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  font-weight: 600;
  color: #1A1A2E;
  margin-bottom: 8px;
  line-height: 1.3;
  transition: color 0.3s;
}
.post-item:hover h3 { color: #C4882F; }

.post-excerpt {
  font-size: 14px;
  color: #777;
  line-height: 1.7;
  margin-bottom: 6px;
}
.post-arrow {
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  color: #C4882F;
  letter-spacing: 1px;
  opacity: 0;
  transform: translateX(-8px);
  transition: all 0.3s;
}
.post-item:hover .post-arrow {
  opacity: 1;
  transform: translateX(0);
}

@media (max-width: 768px) {
  .posts-hero { padding: 60px 20px 40px; }
  .post-item h3 { font-size: 19px; }
}
</style>

<div class="posts-hero">
  <h1>观点与洞察</h1>
  <p>15年思考的沉淀，从分享主义到知识资产化</p>
</div>

<div class="post-list">
  {% for post in site.posts %}
  <a href="{{ post.url | prepend: site.baseurl }}" class="post-item">
    <div class="post-date">{{ post.date | date: "%Y-%m-%d" }}</div>
    <h3>{{ post.title }}</h3>
    {% if post.excerpt %}
    <p class="post-excerpt">{{ post.excerpt | strip_html | truncatewords: 40 }}</p>
    {% endif %}
    <div class="post-arrow">阅读全文 →</div>
  </a>
  {% endfor %}
</div>
